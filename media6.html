  <style>
    body {
      margin: 0;
      font-family: 'Barlow', sans-serif;
      background: #0f0f0f;
      color: white;
    }
    .main-header {
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #000;
    }

    .main-header img {
      height: 40px;
    }

    .nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }


    .gallery-heading {
      text-align: center;
      color: #d4af37;
      margin: 30px 0;
      font-size: 2.2rem;
    }
    
    .photo-wall {
      column-count: 4;
      column-gap: 15px;
      padding: 0 20px 40px;
    }

    .photo-wall img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 12px;
      break-inside: avoid;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .photo-wall img:hover {
      transform: scale(1.04);
      filter: brightness(1.05);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .photo-wall { column-count: 3; }
    }

    @media (max-width: 768px) {
      .photo-wall { column-count: 2; }
    }

    @media (max-width: 480px) {
      .photo-wall { column-count: 1; }
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
    }

    .lightbox span {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 40px;
      cursor: pointer;
    }
  </style>

</head>

  <div class="lightbox" id="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
  </div>

  <script>
    const images = document.querySelectorAll(".photo-wall img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    images.forEach(img => {
      img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
      });
    });

    function closeLightbox() {
      lightbox.style.display = "none";
    }
  </script>
